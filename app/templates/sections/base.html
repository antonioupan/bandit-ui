<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="{{ url_for('static', path='img/apple-icon.png') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', path='img/favicon.png') }}">
  <title>{% block title %}Bandit Dashboard{% endblock %}</title>

  <!-- Fonts and icons -->
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900|Roboto+Slab:400,700" />
  <!-- Nucleo Icons -->
  <link href="{{ url_for('static', path='css/nucleo-icons.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', path='css/nucleo-svg.css') }}" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Material Icons (classic + round + symbols, so all icon classes used in templates render) -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <!-- CSS Files -->
  <link id="pagestyle" href="{{ url_for('static', path='css/material-dashboard.css?v=3.2.0') }}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-200">
  
  <!-- Sidebar -->
  {% include 'sections/sidebar.html' %}

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg ">
    <!-- Navbar -->
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-4 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
      <div class="container-fluid py-1 px-3">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="/">Home</a></li>
            <li class="breadcrumb-item text-sm text-dark active" aria-current="page">{% block page_name %}Dashboard{% endblock %}</li>
          </ol>
          <h6 class="font-weight-bolder mb-0">{% block page_title %}Dashboard{% endblock %}</h6>
        </nav>
      </div>
    </nav>
    <!-- End Navbar -->

    {% block content %}{% endblock %}

    {% include 'sections/footer.html' %}
  </main>

  <!-- Core JS Files -->
  {% include 'sections/core_js_files.html' %}
  
  <!-- Material Dashboard JS -->
  <script src="{{ url_for('static', path='js/material-dashboard.min.js?v=3.2.0') }}"></script>
  
</body>
</html>

{% extends "sections/base.html" %}

{% block title %}Scan Results{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Scan Overview -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header pb-0 px-3">
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="mb-0">Scan Results</h6>
                            <p class="text-sm mb-0" id="scanInfo">Loading scan information...</p>
                        </div>
                        <div class="col-md-6 text-end">
                            <button class="btn btn-outline-primary btn-sm" onclick="exportResults()">
                                <i class="material-icons text-sm me-1">download</i>Export Results
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body pt-4 p-3">
                    <div class="row">
                        <div class="col-lg-3 col-md-6 mb-4">
                            <div class="card text-center">
                                <div class="card-body p-3">
                                    <div class="text-primary text-lg mb-0">
                                        <h3 id="totalIssues" class="font-weight-bolder">-</h3>
                                    </div>
                                    <h6 class="mb-0 font-weight-bolder">Total Issues</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-md-6 mb-4">
                            <div class="card text-center">
                                <div class="card-body p-3">
                                    <div class="text-danger text-lg mb-0">
                                        <h3 id="highSeverity" class="font-weight-bolder">-</h3>
                                    </div>
                                    <h6 class="mb-0 font-weight-bolder">High Severity</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-md-6 mb-4">
                            <div class="card text-center">
                                <div class="card-body p-3">
                                    <div class="text-warning text-lg mb-0">
                                        <h3 id="mediumSeverity" class="font-weight-bolder">-</h3>
                                    </div>
                                    <h6 class="mb-0 font-weight-bolder">Medium Severity</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-md-6 mb-4">
                            <div class="card text-center">
                                <div class="card-body p-3">
                                    <div class="text-info text-lg mb-0">
                                        <h3 id="lowSeverity" class="font-weight-bolder">-</h3>
                                    </div>
                                    <h6 class="mb-0 font-weight-bolder">Low Severity</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="row align-items-end">
                        <div class="col-md-3 mb-2 mb-md-0">
                            <label class="form-label text-sm mb-1" for="severityFilter">Severity</label>
                            <select class="form-select border px-2 py-1" id="severityFilter">
                                <option value="">All Severities</option>
                                <option value="HIGH">High</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="LOW">Low</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-2 mb-md-0">
                            <label class="form-label text-sm mb-1" for="confidenceFilter">Confidence</label>
                            <select class="form-select border px-2 py-1" id="confidenceFilter">
                                <option value="">All Confidence</option>
                                <option value="HIGH">High</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="LOW">Low</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-2 mb-md-0">
                            <label class="form-label text-sm mb-1" for="searchFilter">Search</label>
                            <input type="text" class="form-control border px-2 py-1" id="searchFilter" placeholder="Search issues...">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100 mb-0" onclick="applyFilters()">Filter</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Security Issues -->
    <div class="row">
        <div class="col-12">
            <div class="card my-4">
                <div class="card-header pb-0 px-3">
                    <h6 class="mb-0">Security Issues Found</h6>
                </div>
                <div class="card-body px-0 pb-2">
                    <div id="issuesContainer">
                        <!-- Issues will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Issue Detail Modal -->
<div class="modal fade" id="issueModal" tabindex="-1" role="dialog" aria-labelledby="issueModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="issueModalLabel">Security Issue Details</h5>
                <button type="button" class="btn-close text-dark" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body" id="issueModalBody">
                <!-- Issue details will be populated here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <a id="moreInfoLink" href="#" target="_blank" class="btn btn-primary">More Information</a>
            </div>
        </div>
    </div>
</div>

<script>
let scanResults = null;
let filteredResults = null;

// Get scan ID from URL
const scanId = window.location.pathname.split('/').pop();

document.addEventListener('DOMContentLoaded', function() {
    loadScanResults();
    
    // Add event listeners for real-time filtering
    document.getElementById('severityFilter').addEventListener('change', applyFilters);
    document.getElementById('confidenceFilter').addEventListener('change', applyFilters);
    document.getElementById('searchFilter').addEventListener('input', applyFilters);
});

async function loadScanResults() {
    try {
        const response = await fetch(`/api/scan/results/${scanId}`);
        
        if (!response.ok) {
            throw new Error('Scan not found');
        }
        
        scanResults = await response.json();
        // Tag each finding with its canonical index in the stored results
        // so triage actions target the right issue regardless of filtering.
        scanResults.results.forEach((issue, i) => { issue._idx = i; });

        updateScanInfo();
        updateMetrics();

        // Allow deep-linking from the dashboard, e.g. /results/<id>?severity=HIGH
        const severityParam = new URLSearchParams(window.location.search).get('severity');
        if (severityParam) {
            document.getElementById('severityFilter').value = severityParam.toUpperCase();
        }
        applyFilters();

    } catch (error) {
        console.error('Failed to load scan results:', error);
        document.getElementById('scanInfo').innerHTML = 
            '<span class="text-danger">Failed to load scan results: ' + error.message + '</span>';
    }
}

function updateScanInfo() {
    const scanDate = new Date(scanResults.generated_at).toLocaleString();
    const scanType = scanResults.scan_type || 'upload';
    
    document.getElementById('scanInfo').innerHTML = 
        `Scan ID: ${scanResults.scan_id || scanId} | Generated: ${scanDate} | Type: ${scanType}`;
}

function updateMetrics() {
    // Count from the live results so triage (severity changes / false
    // positives) is reflected immediately without a page reload.
    const active = scanResults.results.filter(issue => !issue.false_positive);

    document.getElementById('totalIssues').textContent = active.length;
    document.getElementById('highSeverity').textContent =
        active.filter(i => i.issue_severity === 'HIGH').length;
    document.getElementById('mediumSeverity').textContent =
        active.filter(i => i.issue_severity === 'MEDIUM').length;
    document.getElementById('lowSeverity').textContent =
        active.filter(i => i.issue_severity === 'LOW').length;
}

function renderIssues() {
    const container = document.getElementById('issuesContainer');
    container.innerHTML = '';
    
    if (filteredResults.length === 0) {
        const scanErrors = getScanErrors();
        if (scanErrors.length > 0) {
            container.innerHTML = `
                <div class="alert alert-danger text-white mx-3" role="alert">
                    <h6 class="text-white mb-2">
                        <i class="material-icons text-sm me-1 align-middle">error_outline</i>Scan did not complete
                    </h6>
                    <p class="text-sm mb-2">Bandit reported errors, so no issues could be analysed. This is not a clean result.</p>
                    <pre class="text-xs text-white mb-0" style="white-space: pre-wrap;">${escapeHtml(scanErrors.join('\n'))}</pre>
                </div>`;
            return;
        }
        container.innerHTML =
            '<div class="text-center p-4"><h6 class="text-muted">No security issues found</h6></div>';
        return;
    }
    
    filteredResults.forEach((issue, index) => {
        const issueCard = createIssueCard(issue, index);
        container.appendChild(issueCard);
    });
}

function createIssueCard(issue, index) {
    const div = document.createElement('div');
    div.className = 'card m-3';

    const isFalsePositive = !!issue.false_positive;
    if (isFalsePositive) {
        div.classList.add('opacity-6');
        div.style.borderLeft = '4px solid #8392ab';
    }

    const severityBadge = getSeverityBadge(issue.issue_severity);
    const confidenceBadge = getConfidenceBadge(issue.issue_confidence);
    const overrideNote = issue.original_severity && issue.original_severity !== issue.issue_severity
        ? `<small class="text-muted ms-1">(was ${issue.original_severity})</small>` : '';
    const fpBadge = isFalsePositive
        ? '<span class="badge badge-sm bg-gradient-secondary ms-1">False Positive</span>' : '';

    div.innerHTML = `
        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <h6 class="mb-1">${issue.test_name} (${issue.test_id})</h6>
                    <p class="text-sm mb-2">${issue.issue_text}</p>
                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="material-icons text-sm me-1">folder</i>${escapeHtml(cleanPath(issue.filename))}:${issue.line_number}
                        </small>
                    </div>
                    <div>
                        ${severityBadge}${overrideNote}
                        ${confidenceBadge}
                        <span class="badge badge-sm bg-gradient-info ms-1">CWE-${issue.issue_cwe?.id || 'N/A'}</span>
                        ${fpBadge}
                    </div>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-sm btn-outline-primary mb-2" onclick="showIssueDetails(${index})">
                        <i class="material-icons text-sm me-1">visibility</i>View Details
                    </button>
                    <div class="mb-2">
                        <label class="form-label text-xs text-muted mb-1 d-block">Severity</label>
                        <select class="form-select form-select-sm d-inline-block w-auto" onchange="changeSeverity(${issue._idx}, this.value)">
                            ${['HIGH', 'MEDIUM', 'LOW'].map(s =>
                                `<option value="${s}" ${issue.issue_severity === s ? 'selected' : ''}>${s.charAt(0) + s.slice(1).toLowerCase()}</option>`
                            ).join('')}
                        </select>
                    </div>
                    <button class="btn btn-sm ${isFalsePositive ? 'btn-secondary' : 'btn-outline-warning'} mb-0"
                            onclick="toggleFalsePositive(${issue._idx})">
                        <i class="material-icons text-sm me-1">${isFalsePositive ? 'undo' : 'flag'}</i>${isFalsePositive ? 'Unmark False Positive' : 'Mark False Positive'}
                    </button>
                </div>
            </div>
            <div class="mt-3">
                <div class="bg-gray-100 p-3 border-radius-lg">
                    <h6 class="text-sm mb-2">Code:</h6>
                    <pre class="text-xs mb-0"><code>${escapeHtml(issue.code)}</code></pre>
                </div>
            </div>
        </div>
    `;

    return div;
}

// Strip any leftover container path (e.g. /app/uploads/<id>/extracted/ or
// /app/repositories/<id>/) so only the project-relative path is shown.
function cleanPath(path) {
    if (!path) return path;
    return String(path)
        .replace(/^.*\/extracted\//, '')
        .replace(/^\/?app\/(uploads|repositories)\/[^/]+\/?/, '');
}

async function patchIssue(idx, body) {
    try {
        const response = await fetch(`/api/scan/results/${scanId}/issues/${idx}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const updated = await response.json();
        updated._idx = idx;
        scanResults.results[idx] = updated;
        updateMetrics();
        applyFilters();
        return true;
    } catch (error) {
        console.error('Failed to update issue:', error);
        showToast('Failed to update issue: ' + error.message, 'danger');
        return false;
    }
}

async function changeSeverity(idx, severity) {
    if (await patchIssue(idx, { issue_severity: severity })) {
        showToast(`Severity set to ${severity}`, 'success');
    }
}

async function toggleFalsePositive(idx) {
    const current = !!scanResults.results[idx].false_positive;
    if (await patchIssue(idx, { false_positive: !current })) {
        showToast(current ? 'Unmarked as false positive' : 'Marked as false positive', 'success');
    }
}

function showToast(message, type = 'info') {
    let container = document.getElementById('toastContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toastContainer';
        container.className = 'position-fixed top-0 end-0 p-3';
        container.style.zIndex = '1100';
        document.body.appendChild(container);
    }
    const colors = {
        success: 'bg-gradient-success',
        danger: 'bg-gradient-danger',
        warning: 'bg-gradient-warning',
        info: 'bg-gradient-info'
    };
    const toast = document.createElement('div');
    toast.className = `toast align-items-center text-white ${colors[type] || colors.info} border-0 show mb-2`;
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" aria-label="Close"></button>
        </div>`;
    toast.querySelector('.btn-close').addEventListener('click', () => toast.remove());
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

function getScanErrors() {
    const errors = [];
    if (scanResults.error) {
        errors.push(String(scanResults.error));
    }
    const list = scanResults.errors;
    if (Array.isArray(list)) {
        list.forEach(e => {
            if (typeof e === 'string') {
                errors.push(e);
            } else if (e && typeof e === 'object') {
                // Bandit's native error entries: { filename, reason }
                errors.push([e.filename, e.reason].filter(Boolean).join(': ') || JSON.stringify(e));
            }
        });
    }
    return errors;
}

function getSeverityBadge(severity) {
    const badges = {
        'HIGH': '<span class="badge badge-sm bg-gradient-danger">High</span>',
        'MEDIUM': '<span class="badge badge-sm bg-gradient-warning">Medium</span>',
        'LOW': '<span class="badge badge-sm bg-gradient-info">Low</span>'
    };
    return badges[severity] || '<span class="badge badge-sm bg-gradient-secondary">Unknown</span>';
}

function getConfidenceBadge(confidence) {
    const badges = {
        'HIGH': '<span class="badge badge-sm bg-gradient-success">High Confidence</span>',
        'MEDIUM': '<span class="badge badge-sm bg-gradient-warning">Medium Confidence</span>',
        'LOW': '<span class="badge badge-sm bg-gradient-secondary">Low Confidence</span>'
    };
    return badges[confidence] || '<span class="badge badge-sm bg-gradient-secondary">Unknown</span>';
}

function showIssueDetails(index) {
    const issue = filteredResults[index];
    
    document.getElementById('issueModalLabel').textContent = 
        `${issue.test_name} (${issue.test_id})`;
    
    document.getElementById('issueModalBody').innerHTML = `
        <div class="row mb-3">
            <div class="col-md-6">
                <strong>File:</strong> ${escapeHtml(cleanPath(issue.filename))}
            </div>
            <div class="col-md-6">
                <strong>Line:</strong> ${issue.line_number}
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <strong>Severity:</strong> ${getSeverityBadge(issue.issue_severity)}
            </div>
            <div class="col-md-6">
                <strong>Confidence:</strong> ${getConfidenceBadge(issue.issue_confidence)}
            </div>
        </div>
        <div class="mb-3">
            <strong>Issue:</strong>
            <p class="mt-1">${issue.issue_text}</p>
        </div>
        <div class="mb-3">
            <strong>CWE Information:</strong>
            <p class="mt-1">
                CWE-${issue.issue_cwe?.id || 'N/A'}
                ${issue.issue_cwe?.link ? 
                    `<br><a href="${issue.issue_cwe.link}" target="_blank" class="text-primary">View CWE Details</a>` 
                    : ''}
            </p>
        </div>
        <div class="mb-3">
            <strong>Code Context:</strong>
            <div class="bg-gray-100 p-3 border-radius-lg mt-2">
                <pre><code>${escapeHtml(issue.code)}</code></pre>
            </div>
        </div>
    `;
    
    document.getElementById('moreInfoLink').href = issue.more_info || '#';
    
    const modal = new bootstrap.Modal(document.getElementById('issueModal'));
    modal.show();
}

function applyFilters() {
    const severityFilter = document.getElementById('severityFilter').value;
    const confidenceFilter = document.getElementById('confidenceFilter').value;
    const searchFilter = document.getElementById('searchFilter').value.toLowerCase();
    
    filteredResults = scanResults.results.filter(issue => {
        // Severity filter
        if (severityFilter && issue.issue_severity !== severityFilter) {
            return false;
        }
        
        // Confidence filter
        if (confidenceFilter && issue.issue_confidence !== confidenceFilter) {
            return false;
        }
        
        // Search filter
        if (searchFilter) {
            const searchText = [
                issue.test_name,
                issue.issue_text,
                issue.filename,
                issue.test_id
            ].join(' ').toLowerCase();
            
            if (!searchText.includes(searchFilter)) {
                return false;
            }
        }
        
        return true;
    });
    
    renderIssues();
}

function exportResults() {
    const dataStr = "data:text/json;charset=utf-8," + 
        encodeURIComponent(JSON.stringify(scanResults, null, 2));
    
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", `bandit_scan_${scanId}.json`);
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}
</script>
{% endblock %}
